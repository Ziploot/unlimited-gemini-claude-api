<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Unlimited Claude 3.5 & Gemini Playground — ZipLoot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #000510;
      --panel: rgba(8, 14, 42, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --border-lit: rgba(129, 140, 248, 0.3);
      --ink-0: #ffffff;
      --ink-1: #cbd5e1;
      --ink-2: #94a3b8;
      --v: #818cf8;
      --c: #22d3ee;
      --g: #4ade80;
      --grd: linear-gradient(135deg, #818cf8, #c084fc, #22d3ee);
      --font-d: 'Syne', sans-serif;
      --font-m: 'Space Mono', monospace;
      --font-b: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--void);
      background-image: radial-gradient(circle, rgba(129, 140, 248, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--ink-1);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .wrap { width: 100%; max-width: 800px; }
    header {
      background: var(--panel);
      border: 1px solid var(--border-lit);
      border-radius: 20px;
      padding: 20px 28px;
      backdrop-filter: blur(20px);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-family: var(--font-d); font-size: 22px; font-weight: 800; color: #fff; }
    .logo span { background: var(--grd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .badge { font-family: var(--font-m); font-size: 11px; padding: 6px 14px; border-radius: 100px; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); color: var(--g); }
    
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(20px);
      margin-bottom: 24px;
    }
    h2 { font-family: var(--font-d); font-size: 20px; color: #fff; margin-bottom: 12px; }
    p { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin-bottom: 20px; }
    
    label { font-family: var(--font-m); font-size: 12px; color: var(--v); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    select, input, textarea {
      width: 100%;
      background: rgba(2, 6, 24, 0.85);
      border: 1px solid var(--border-lit);
      border-radius: 12px;
      color: #fff;
      padding: 12px 16px;
      font-family: var(--font-b);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: all 0.25s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--c); box-shadow: 0 0 12px rgba(34, 211, 238, 0.2); }
    
    .btn {
      background: var(--grd);
      color: #fff;
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(129, 140, 248, 0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .output-box {
      background: #020b1a;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      font-family: var(--font-b);
      font-size: 15px;
      line-height: 1.7;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 160px;
      max-height: 500px;
      overflow-y: auto;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span>Claude 3.5 & Gemini</span> Free Studio</div>
      <div class="badge">● 100% Free Engine</div>
    </header>

    <div class="card">
      <h2>⚡ Direct AI Sandbox (No API Keys Required for Claude)</h2>
      <p>Select Claude 3.5 Sonnet or Gemini 2.0 and generate responses instantly without limits.</p>
      
      <label>Choose Model</label>
      <select id="modelSelect">
        <option value="claude-3-5-sonnet">Claude 3.5 Sonnet (Direct Free Access)</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
      </select>

      <div id="geminiKeyBox" style="display: none;">
        <label>Gemini API Key (Only needed for Gemini)</label>
        <input type="password" id="geminiKey" placeholder="Paste Gemini API Key..." />
      </div>

      <label>Enter Message</label>
      <textarea id="promptInput" rows="4" placeholder="Type your prompt here..."></textarea>

      <button class="btn" id="btnRun">Generate Response →</button>

      <div class="output-box" id="outputBox">Response output will appear here...</div>
    </div>
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script>
    const modelSelect = document.getElementById('modelSelect');
    const geminiKeyBox = document.getElementById('geminiKeyBox');
    const btnRun = document.getElementById('btnRun');
    const promptInput = document.getElementById('promptInput');
    const outputBox = document.getElementById('outputBox');
    const geminiKey = document.getElementById('geminiKey');

    modelSelect.addEventListener('change', () => {
      if (modelSelect.value.startsWith('gemini')) {
        geminiKeyBox.style.display = 'block';
      } else {
        geminiKeyBox.style.display = 'none';
      }
    });

    btnRun.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) return alert('Please enter a prompt!');

      const model = modelSelect.value;
      outputBox.textContent = 'Connecting to AI Engine...';
      btnRun.disabled = true;

      if (model === 'claude-3-5-sonnet') {
        try {
          outputBox.textContent = 'Generating response using Claude 3.5 Sonnet...';
          const res = await puter.ai.chat(prompt, { model: 'claude-3-5-sonnet' });
          
          let textResult = '';
          if (typeof res === 'string') {
            textResult = res;
          } else if (res && res.message && res.message.content) {
            if (Array.isArray(res.message.content)) {
              textResult = res.message.content.map(c => c.text || c).join('\n');
            } else {
              textResult = res.message.content;
            }
          } else if (res && res.text) {
            textResult = res.text;
          } else {
            textResult = JSON.stringify(res, null, 2);
          }

          outputBox.textContent = textResult;
        } catch (err) {
          outputBox.textContent = '❌ Claude Execution Error: ' + (err.message || err);
        } finally {
          btnRun.disabled = false;
        }
      } else {
        const apiKey = geminiKey.value.trim();
        if (!apiKey) {
          outputBox.textContent = '❌ Please enter your Gemini API key above!';
          btnRun.disabled = false;
          return;
        }
        try {
          outputBox.textContent = 'Querying Gemini 2.0...';
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error?.message || 'API Error');
          outputBox.textContent = data.candidates[0]?.content?.parts[0]?.text || 'No response text';
        } catch (err) {
          outputBox.textContent = '❌ Gemini Error: ' + err.message;
        } finally {
          btnRun.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
